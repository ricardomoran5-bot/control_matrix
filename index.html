<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Matriz LED BLE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1e1e24;
            color: white;
            padding: 20px;
        }
        h1 { margin-bottom: 30px; }
        .btn {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 15px auto;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        #btn-conectar { background-color: #007bff; color: white; }
        #btn-go { background-color: #28a745; color: white; }
        #btn-stop { background-color: #dc3545; color: white; }
        #btn-slow { background-color: #ffc107; color: black; }
        #btn-rober { background-color: #ffffff; color: black; }
        .status { margin-top: 20px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <h1>Panel Control HUB75 (BLE)</h1>
    
    <button id="btn-conectar" class="btn">🔌 Conectar ESP32 (BLE)</button>
    <p id="status" class="status">Desconectado</p>
    
    <hr style="width: 80%; border-color: #444; margin: 30px auto;">

    <button id="btn-go" class="btn" onclick="enviarComando('1')" disabled>1 - GO</button>
    <button id="btn-stop" class="btn" onclick="enviarComando('2')" disabled>2 - STOP</button>
    <button id="btn-slow" class="btn" onclick="enviarComando('3')" disabled>3 - SLOW</button>
    <button id="btn-rober" class="btn" onclick="enviarComando('4')" disabled>4 - ROBER CABAL</button>

    <script>
        let dispositivoBluetooth = null;
        let caracteristicaTx = null;

        // Mismos UUIDs configurados en el ESP32
        const BLE_SERVICE_UUID        = "4fafc201-75d5-4747-8f14-456c95158c96";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const btnConectar = document.getElementById('btn-conectar');
        const statusTxt = document.getElementById('status');
        const botonesModo = document.querySelectorAll('button:not(#btn-conectar)');

        btnConectar.addEventListener('click', async () => {
            try {
                statusTxt.innerText = "Buscando dispositivo BLE...";
                
                // Filtrar por el nombre del dispositivo BLE o por su servicio UUID
                dispositivoBluetooth = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Matrix_BLE' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });

                statusTxt.innerText = "Conectando al servidor GATT de BLE...";
                const server = await dispositivoBluetooth.gatt.connect();

                statusTxt.innerText = "Obteniendo el servicio principal...";
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);

                statusTxt.innerText = "Obteniendo característica de escritura...";
                caracteristicaTx = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);

                statusTxt.innerText = "🟢 ¡Conectado con éxito por BLE!";
                btnConectar.style.backgroundColor = "#28a745";
                btnConectar.innerText = "🔄 Reconectar";
                
                // Activar los botones de control
                botonesModo.forEach(btn => btn.disabled = false);

            } catch (error) {
                console.error(error);
                statusTxt.innerText = "❌ Error de conexión: " + error.message;
            }
        });

        async function enviarComando(comando) {
            if (!caracteristicaTx) return;
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(comando);
                // Usamos writeValueWithResponse para asegurar la recepción en BLE
                await caracteristicaTx.writeValueWithResponse(data);
                console.log("Comando BLE enviado: " + comando);
            } catch (error) {
                console.error("Error enviando comando: ", error);
                statusTxt.innerText = "⚠️ Error al enviar comando por BLE.";
            }
        }
    </script>
</body>
</html>
