<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control Panel LED 64×64</title>
<style>
  :root {
    --bg-deep:      #0b0d10;
    --bg-panel:     #14171b;
    --steel:        #2a2f36;
    --steel-light:  #3a4148;
    --amber:        #ffb000;
    --go-green:     #00c853;
    --stop-red:     #e8392a;
    --slow-yellow:  #ffd400;
    --ink:          #f4f1ea;
    --ink-dim:      #9aa0a6;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --display: 'Eurostile', 'Arial Narrow', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background-image:
      radial-gradient(circle at 50% 0%, rgba(255,176,0,0.05), transparent 60%);
  }

  .rivet {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #555, #1a1a1a 70%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.8);
    z-index: 5;
  }

  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 18px 16px 36px;
    position: relative;
  }

  /* ---------- HEADER ---------- */
  header {
    text-align: center;
    padding: 10px 0 16px;
    border-bottom: 1px dashed var(--steel-light);
    margin-bottom: 18px;
  }

  .plate {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--display);
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 0.06em;
    margin: 0;
    text-transform: uppercase;
    color: var(--ink);
    text-shadow: 0 0 18px rgba(255,176,0,0.15);
  }

  h1 span { color: var(--amber); }

  /* ---------- CONNECTION STRIP ---------- */
  .conn-strip {
    background: var(--bg-panel);
    border: 1px solid var(--steel);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .led {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #3a1414;
    box-shadow: inset 0 0 3px rgba(0,0,0,0.8);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .led.scanning {
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber), inset 0 0 3px rgba(0,0,0,0.4);
    animation: pulse 1s infinite;
  }
  .led.connected {
    background: var(--go-green);
    box-shadow: 0 0 10px var(--go-green), inset 0 0 3px rgba(0,0,0,0.4);
  }
  .led.error {
    background: var(--stop-red);
    box-shadow: 0 0 10px var(--stop-red), inset 0 0 3px rgba(0,0,0,0.4);
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .conn-text { flex: 1; min-width: 0; }
  .conn-status {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .conn-detail {
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-link {
    background: var(--steel);
    border: 1px solid var(--steel-light);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 9px 14px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-link:active { transform: scale(0.96); }
  .btn-link:hover { background: var(--steel-light); }
  .btn-link.connect { background: var(--amber); color: #1a1300; border-color: var(--amber); }
  .btn-link.connect:hover { background: #ffc233; }
  .btn-link.disconnect { background: var(--bg-panel); color: var(--stop-red); border-color: var(--stop-red); }

  /* ---------- PREVIEW SCREEN ---------- */
  .preview-frame {
    background: linear-gradient(160deg, #1c1f24, #0e1013);
    border: 1px solid var(--steel);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .preview-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .preview-screen {
    aspect-ratio: 1 / 1;
    width: 100%;
    border-radius: 4px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 0 6px #000, inset 0 0 0 8px #2a2a2a;
    transition: background 0.25s ease;
  }

  /* simulación sutil de rejilla de píxeles del panel */
  .preview-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0 1px, transparent 1px 6px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.25) 0 1px, transparent 1px 6px);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .preview-screen[data-mode="0"] { background: #000; }
  .preview-screen[data-mode="1"] { background: var(--go-green); }
  .preview-screen[data-mode="2"] { background: var(--stop-red); }
  .preview-screen[data-mode="3"] { background: var(--slow-yellow); }
  .preview-screen[data-mode="4"] { background: #000; }

  .preview-text {
    font-family: var(--display);
    font-weight: 900;
    letter-spacing: 0.03em;
    text-align: center;
    z-index: 1;
    text-transform: uppercase;
    line-height: 1.15;
  }
  .preview-screen[data-mode="0"] .preview-text { color: var(--ink-dim); font-size: 7%; letter-spacing: 0.15em; font-weight: 400; }
  .preview-screen[data-mode="1"] .preview-text,
  .preview-screen[data-mode="2"] .preview-text { color: #fff; font-size: 22%; }
  .preview-screen[data-mode="3"] .preview-text { color: #000; font-size: 18%; }
  .preview-screen[data-mode="4"] .preview-text { color: #fff; font-size: 13%; }

  /* ---------- MODE GRID ---------- */
  .modes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .mode-btn {
    position: relative;
    border: none;
    border-radius: 12px;
    padding: 22px 10px 16px;
    font-family: var(--display);
    font-weight: 900;
    font-size: 19px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    color: #fff;
    overflow: hidden;
    transition: transform 0.08s ease, box-shadow 0.15s ease, filter 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .mode-btn .num {
    position: absolute;
    top: 8px; left: 10px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    opacity: 0.6;
    letter-spacing: 0.1em;
  }

  .mode-btn .sub {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.18em;
    opacity: 0.75;
    margin-top: 4px;
  }

  .mode-btn:active { transform: scale(0.95); }
  .mode-btn:disabled { filter: grayscale(0.6) brightness(0.5); cursor: not-allowed; }

  .mode-btn.go      { background: linear-gradient(155deg, #00e676, #00913f); }
  .mode-btn.stop    { background: linear-gradient(155deg, #ff5546, #b81f12); }
  .mode-btn.slow    { background: linear-gradient(155deg, #ffe042, #d4a900); color: #1a1300; }
  .mode-btn.slow .sub { color: #3a2e00; }
  .mode-btn.name    { background: linear-gradient(155deg, #383d44, #16181b); grid-column: span 2; }

  .mode-btn.active {
    box-shadow: 0 0 0 3px var(--amber), 0 6px 18px rgba(255,176,0,0.25);
  }

  /* ---------- LOG ---------- */
  .log-box {
    margin-top: 20px;
    background: var(--bg-panel);
    border: 1px solid var(--steel);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--ink-dim);
    max-height: 110px;
    overflow-y: auto;
  }
  .log-box .log-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .log-line:last-child { border-bottom: none; }
  .log-line.err { color: var(--stop-red); }
  .log-line.ok { color: var(--go-green); }

  footer {
    text-align: center;
    margin-top: 22px;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }

  @media (prefers-reduced-motion: reduce) {
    .led.scanning { animation: none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="plate">SISTEMA DE SEÑALIZACIÓN · BLE</div>
    <h1>PANEL<span>·</span>64</h1>
  </header>

  <div class="conn-strip">
    <div class="led" id="led" aria-hidden="true"></div>
    <div class="conn-text">
      <div class="conn-status" id="connStatus">Sin conexión</div>
      <div class="conn-detail" id="connDetail">Pulsa conectar para buscar el panel</div>
    </div>
    <button class="btn-link connect" id="btnConnect">Conectar</button>
  </div>

  <div class="preview-frame">
    <div class="preview-label">
      <span>Vista previa</span>
      <span id="previewState">SIN SEÑAL</span>
    </div>
    <div class="preview-screen" id="previewScreen" data-mode="0">
      <div class="preview-text" id="previewText">ESPERANDO MODO</div>
    </div>
  </div>

  <div class="modes">
    <button class="mode-btn go" id="btnGo" data-mode="1" disabled>
      <span class="num">01</span>
      GO
      <span class="sub">FONDO VERDE</span>
    </button>
    <button class="mode-btn stop" id="btnStop" data-mode="2" disabled>
      <span class="num">02</span>
      STOP
      <span class="sub">FONDO ROJO</span>
    </button>
    <button class="mode-btn slow" id="btnSlow" data-mode="3" disabled>
      <span class="num">03</span>
      SLOW
      <span class="sub">FONDO AMARILLO</span>
    </button>
    <button class="mode-btn name" id="btnName" data-mode="4" disabled>
      <span class="num">04</span>
      ROBER CABAL
      <span class="sub">BLANCO SOBRE NEGRO</span>
    </button>
  </div>

  <div class="log-box">
    <div class="log-title">Registro de conexión</div>
    <div id="logList"></div>
  </div>

  <footer>WEB BLUETOOTH · REQUIERE CHROME / EDGE EN ANDROID</footer>

</div>

<script>
// =======================================================================
// CONFIGURACIÓN BLE — debe coincidir EXACTAMENTE con el firmware ESP32
// =======================================================================
const SERVICE_UUID        = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const COMMAND_CHAR_UUID   = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // Write
const STATUS_CHAR_UUID    = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // Notify
const DEVICE_NAME_PREFIX  = 'PANEL-LED-64';

// =======================================================================
// ESTADO
// =======================================================================
let bleDevice = null;
let bleServer = null;
let commandCharacteristic = null;
let statusCharacteristic = null;

const MODE_INFO = {
  0: { text: 'ESPERANDO MODO', label: 'SIN SEÑAL' },
  1: { text: 'GO',            label: 'MODO 01 · GO' },
  2: { text: 'STOP',          label: 'MODO 02 · STOP' },
  3: { text: 'SLOW',          label: 'MODO 03 · SLOW' },
  4: { text: 'ROBER<br>CABAL', label: 'MODO 04 · NOMBRE' },
};

// =======================================================================
// ELEMENTOS DOM
// =======================================================================
const el = {
  led: document.getElementById('led'),
  connStatus: document.getElementById('connStatus'),
  connDetail: document.getElementById('connDetail'),
  btnConnect: document.getElementById('btnConnect'),
  previewScreen: document.getElementById('previewScreen'),
  previewText: document.getElementById('previewText'),
  previewState: document.getElementById('previewState'),
  logList: document.getElementById('logList'),
  modeButtons: [
    document.getElementById('btnGo'),
    document.getElementById('btnStop'),
    document.getElementById('btnSlow'),
    document.getElementById('btnName'),
  ],
};

// =======================================================================
// LOG
// =======================================================================
function log(msg, type = '') {
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' ' + type : '');
  const time = new Date().toLocaleTimeString('es-ES', { hour12: false });
  line.textContent = `[${time}] ${msg}`;
  el.logList.prepend(line);
  while (el.logList.children.length > 30) {
    el.logList.removeChild(el.logList.lastChild);
  }
}

// =======================================================================
// UI HELPERS
// =======================================================================
function setConnectionState(state, detail) {
  el.led.classList.remove('scanning', 'connected', 'error');
  el.btnConnect.classList.remove('connect', 'disconnect');

  if (state === 'scanning') {
    el.led.classList.add('scanning');
    el.connStatus.textContent = 'Buscando…';
    el.btnConnect.textContent = 'Buscando…';
    el.btnConnect.classList.add('connect');
    el.btnConnect.disabled = true;
  } else if (state === 'connected') {
    el.led.classList.add('connected');
    el.connStatus.textContent = 'Conectado';
    el.btnConnect.textContent = 'Desconectar';
    el.btnConnect.classList.add('disconnect');
    el.btnConnect.disabled = false;
  } else if (state === 'error') {
    el.led.classList.add('error');
    el.connStatus.textContent = 'Error de conexión';
    el.btnConnect.textContent = 'Reintentar';
    el.btnConnect.classList.add('connect');
    el.btnConnect.disabled = false;
  } else {
    el.connStatus.textContent = 'Sin conexión';
    el.btnConnect.textContent = 'Conectar';
    el.btnConnect.classList.add('connect');
    el.btnConnect.disabled = false;
  }

  el.connDetail.textContent = detail || '';
  setModeButtonsEnabled(state === 'connected');
}

function setModeButtonsEnabled(enabled) {
  el.modeButtons.forEach(btn => { btn.disabled = !enabled; });
}

function updatePreview(mode) {
  const info = MODE_INFO[mode] || MODE_INFO[0];
  el.previewScreen.setAttribute('data-mode', String(mode));
  el.previewText.innerHTML = info.text;
  el.previewState.textContent = info.label;

  el.modeButtons.forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.mode) === mode);
  });
}

// =======================================================================
// BLUETOOTH
// =======================================================================
function isWebBluetoothSupported() {
  return 'bluetooth' in navigator;
}

async function connect() {
  if (!isWebBluetoothSupported()) {
    setConnectionState('error', 'Este navegador no soporta Web Bluetooth');
    log('Web Bluetooth no disponible. Usa Chrome o Edge en Android.', 'err');
    alert('Tu navegador no soporta Web Bluetooth.\nAbre esta página con Chrome o Edge en un dispositivo Android.');
    return;
  }

  try {
    setConnectionState('scanning', 'Selecciona el panel en la lista del sistema…');
    log('Abriendo selector de dispositivos Bluetooth…');

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: DEVICE_NAME_PREFIX }],
      optionalServices: [SERVICE_UUID],
    });

    log(`Dispositivo seleccionado: ${bleDevice.name || '(sin nombre)'}`);
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    setConnectionState('scanning', 'Conectando con el panel…');
    bleServer = await bleDevice.gatt.connect();

    const service = await bleServer.getPrimaryService(SERVICE_UUID);

    commandCharacteristic = await service.getCharacteristic(COMMAND_CHAR_UUID);

    try {
      statusCharacteristic = await service.getCharacteristic(STATUS_CHAR_UUID);
      await statusCharacteristic.startNotifications();
      statusCharacteristic.addEventListener('characteristicvaluechanged', onStatusNotify);
    } catch (e) {
      log('Aviso: no se pudo suscribir al estado del panel (no crítico).');
    }

    setConnectionState('connected', bleDevice.name || 'Panel LED');
    log('Conexión establecida correctamente.', 'ok');
    updatePreview(0);

  } catch (err) {
    console.error(err);
    setConnectionState('error', err.message || 'No se pudo conectar');
    log(`Error: ${err.message || err}`, 'err');
  }
}

function onDisconnected() {
  log('El panel se ha desconectado.', 'err');
  setConnectionState('idle', 'Conexión perdida');
  updatePreview(0);
  commandCharacteristic = null;
  statusCharacteristic = null;
}

function disconnect() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  setConnectionState('idle', '');
  updatePreview(0);
  log('Desconectado manualmente.');
}

function onStatusNotify(event) {
  const value = event.target.value;
  if (value.byteLength > 0) {
    const mode = value.getUint8(0);
    log(`Confirmación del panel: modo ${mode} activo.`, 'ok');
    updatePreview(mode);
  }
}

async function sendMode(mode) {
  if (!commandCharacteristic) {
    log('No hay conexión activa con el panel.', 'err');
    return;
  }
  try {
    const data = new Uint8Array([String(mode).charCodeAt(0)]);
    await commandCharacteristic.writeValue(data);
    log(`Comando enviado: modo ${mode}.`);
    updatePreview(mode); // feedback inmediato; se reconfirma si llega notify
  } catch (err) {
    console.error(err);
    log(`Error al enviar comando: ${err.message || err}`, 'err');
  }
}

// =======================================================================
// EVENTOS
// =======================================================================
el.btnConnect.addEventListener('click', () => {
  if (bleDevice && bleDevice.gatt.connected) {
    disconnect();
  } else {
    connect();
  }
});

el.modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = Number(btn.dataset.mode);
    sendMode(mode);
  });
});

// =======================================================================
// INICIO
// =======================================================================
setConnectionState('idle', '');
updatePreview(0);

if (!isWebBluetoothSupported()) {
  log('Aviso: este navegador no soporta Web Bluetooth.', 'err');
}
</script>

</body>
</html>
