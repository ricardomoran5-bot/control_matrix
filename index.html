<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Técnicos FAPA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1e1e24;
            color: white;
            padding: 20px;
            margin: 0;
        }
        h1 { 
            margin-bottom: 30px; 
            font-size: 2.2rem;
            color: #f8f9fa;
        }
        
        /* Contenedor para alinear los botones de conexión */
        .cont-conexion {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Botones de sistema (Píldoras 3D) */
        .btn-sys {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        #btn-conectar {
            background-color: #007bff;
            box-shadow: 0 8px #0056b3;
        }
        #btn-conectar:active { box-shadow: 0 2px #0056b3; transform: translateY(6px); }

        #btn-desconectar {
            background-color: #dc3545;
            box-shadow: 0 8px #a71d2a;
            display: none; /* Oculto por defecto */
        }
        #btn-desconectar:active { box-shadow: 0 2px #a71d2a; transform: translateY(6px); }

        .status { color: #aaa; font-style: italic; margin-bottom: 30px; }

        /* Contenedor de los botones circulares (COLUMNA 1x4) */
        .grid-botones {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            gap: 25px;              
            max-width: 400px;
            margin: 0 auto;
        }

        /* Diseño de los botones redondos 3D */
        .btn-modo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            outline: none;
            transition: all 0.1s;
            opacity: 0.5; 
        }

        .btn-modo:active, .btn-modo.activo {
            transform: translateY(8px);
            opacity: 1 !important;
        }

        #btn-go { background-color: #28a745; color: white; box-shadow: 0 10px #1c7430; }
        #btn-go:active, #btn-go.activo { box-shadow: 0 2px #1c7430; }

        #btn-stop { background-color: #dc3545; color: white; box-shadow: 0 10px #a71d2a; }
        #btn-stop:active, #btn-stop.activo { box-shadow: 0 2px #a71d2a; }

        #btn-slow { background-color: #ffc107; color: black; box-shadow: 0 10px #ba8b00; }
        #btn-slow:active, #btn-slow.activo { box-shadow: 0 2px #ba8b00; }

        #btn-wait { background-color: #17a2b8; color: white; box-shadow: 0 10px #117a8b; }
        #btn-wait:active, #btn-wait.activo { box-shadow: 0 2px #117a8b; }

    </style>
</head>
<body>

    <h1>LED Técnicos FAPA</h1>
    
    <div class="cont-conexion">
        <button id="btn-conectar" class="btn-sys">🔌 Conectar Panel</button>
        <button id="btn-desconectar" class="btn-sys">🔴 Desconectar</button>
    </div>
    
    <p id="status" class="status">Desconectado</p>
    
    <hr style="width: 80%; border-color: #444; margin: 20px auto 40px auto;">

    <div class="grid-botones">
        <button id="btn-go" class="btn-modo" onclick="enviarComando('1', this)" disabled>GO</button>
        <button id="btn-stop" class="btn-modo" onclick="enviarComando('2', this)" disabled>STOP</button>
        <button id="btn-slow" class="btn-modo" onclick="enviarComando('3', this)" disabled>SLOW</button>
        <button id="btn-wait" class="btn-modo" onclick="enviarComando('4', this)" disabled>WAIT</button>
    </div>

    <script>
        let dispositivoBluetooth = null;
        let caracteristicaTx = null;

        const BLE_SERVICE_UUID        = "4fafc201-75d5-4747-8f14-456c95158c96";
        const BLE_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const btnConectar = document.getElementById('btn-conectar');
        const btnDesconectar = document.getElementById('btn-desconectar');
        const statusTxt = document.getElementById('status');
        const botonesModo = document.querySelectorAll('.btn-modo');

        // Función para resetear la interfaz al desconectar
        function manejarDesconexion() {
            statusTxt.innerText = "Desconectado";
            btnConectar.style.display = "inline-block";
            btnDesconectar.style.display = "none";
            
            botonesModo.forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = "0.5";
                btn.classList.remove('activo');
            });
            caracteristicaTx = null;
        }

        btnConectar.addEventListener('click', async () => {
            try {
                statusTxt.innerText = "Buscando dispositivo...";
                
                dispositivoBluetooth = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'LED_Tecnicos_FAPA' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });

                // Detectar si el dispositivo se desconecta físicamente (ej. pérdida de batería)
                dispositivoBluetooth.addEventListener('gattserverdisconnected', manejarDesconexion);

                statusTxt.innerText = "Conectando al Bluetooth...";
                const server = await dispositivoBluetooth.gatt.connect();

                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                caracteristicaTx = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);

                statusTxt.innerText = "🟢 ¡Conectado y listo!";
                
                // Cambiar botones de sistema
                btnConectar.style.display = "none";
                btnDesconectar.style.display = "inline-block";
                
                // Activar botonera principal
                botonesModo.forEach(btn => {
                    btn.disabled = false;
                    btn.style.opacity = "1";
                });

            } catch (error) {
                console.error(error);
                statusTxt.innerText = "❌ Error: " + error.message;
            }
        });

        // Evento para el botón de desconectar
        btnDesconectar.addEventListener('click', () => {
            if (dispositivoBluetooth && dispositivoBluetooth.gatt.connected) {
                dispositivoBluetooth.gatt.disconnect();
                manejarDesconexion();
            }
        });

        async function enviarComando(comando, botonPresionado) {
            if (!caracteristicaTx) return;
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(comando);
                await caracteristicaTx.writeValueWithResponse(data);
                
                botonesModo.forEach(btn => btn.classList.remove('activo'));
                botonPresionado.classList.add('activo');

            } catch (error) {
                console.error("Error enviando comando: ", error);
                statusTxt.innerText = "⚠️ Error al enviar comando.";
            }
        }
    </script>
</body>
</html>
