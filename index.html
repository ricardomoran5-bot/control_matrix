<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Matriz LED</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1e1e24;
            color: white;
            padding: 20px;
        }
        h1 { margin-bottom: 30px; }
        .btn {
            display: block;
            width: 80%;
            max-width: 300px;
            margin: 15px auto;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        #btn-conectar { background-color: #007bff; color: white; }
        #btn-go { background-color: #28a745; color: white; }
        #btn-stop { background-color: #dc3545; color: white; }
        #btn-slow { background-color: #ffc107; color: black; }
        #btn-rober { background-color: #ffffff; color: black; }
        .status { margin-top: 20px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <h1>Panel Control HUB75</h1>
    
    <button id="btn-conectar" class="btn">🔌 Conectar ESP32</button>
    <p id="status" class="status">Desconectado</p>
    
    <hr style="width: 80%; border-color: #444; margin: 30px auto;">

    <button id="btn-go" class="btn" onclick="enviarComando('1')" disabled>1 - GO</button>
    <button id="btn-stop" class="btn" onclick="enviarComando('2')" disabled>2 - STOP</button>
    <button id="btn-slow" class="btn" onclick="enviarComando('3')" disabled>3 - SLOW</button>
    <button id="btn-rober" class="btn" onclick="enviarComando('4')" disabled>4 - ROBER CABAL</button>

    <script>
        let dispositivoBluetooth = null;
        let caracteristicaTx = null;

        // UUIDs estándar para emulación de Puerto Serie sobre Bluetooth (SPP)
        const SerialPortServiceUUID = "00001101-0000-1000-8000-00805f9b34fb";

        const btnConectar = document.getElementById('btn-conectar');
        const statusTxt = document.getElementById('status');
        const botonesModo = document.querySelectorAll('button:not(#btn-conectar)');

        btnConectar.addEventListener('click', async () => {
            try {
                statusTxt.innerText = "Buscando ESP32...";
                
                // Solicitar dispositivo con el servicio SPP
                dispositivoBluetooth = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Matrix_Control' }],
                    optionalServices: [SerialPortServiceUUID]
                });

                statusTxt.innerText = "Conectando al servidor GATT...";
                const server = await dispositivoBluetooth.gatt.connect();

                statusTxt.innerText = "Obteniendo servicio serie...";
                const service = await server.getPrimaryService(SerialPortServiceUUID);

                statusTxt.innerText = "Obteniendo características...";
                // En SPP, solemos buscar la primera característica disponible para escribir
                const characteristics = await service.getCharacteristics();
                caracteristicaTx = characteristics[0];

                statusTxt.innerText = "🟢 ¡Conectado con éxito!";
                btnConectar.style.backgroundColor = "#28a745";
                btnConectar.innerText = "🔄 Reconectar";
                
                // Activar los botones de control
                botonesModo.forEach(btn => btn.disabled = false);

            } catch (error) {
                console.error(error);
                statusTxt.innerText = "❌ Error de conexión: " + error.message;
            }
        });

        async function enviarComando(comando) {
            if (!caracteristicaTx) return;
            try {
                // Convertir el string en un ArrayBuffer (bytes)
                const encoder = new TextEncoder();
                const data = encoder.encode(comando);
                await caracteristicaTx.writeValue(data);
                console.log("Comando enviado: " + comando);
            } catch (error) {
                console.error("Error enviando comando: ", error);
                statusTxt.innerText = "⚠️ Error al enviar comando.";
            }
        }
    </script>
</body>
</html>
